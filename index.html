<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추첨기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="테마 전환">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>
  <main class="app-shell">
    <section class="hero">
      <h1>로또 번호 추첨기</h1>
      <p>버튼을 눌러 1부터 45까지의 숫자 중 무작위 6개 번호를 추첨하세요.</p>
    </section>

    <section class="lotto-card">
      <div class="controls">
        <button id="generateBtn" class="primary-btn">번호 생성</button>
        <button id="resetBtn" class="secondary-btn">초기화</button>
      </div>
      <div id="result" class="result">
        <p class="result-label">추첨된 번호</p>
        <div id="balls" class="balls" aria-live="polite"></div>
      </div>
    </section>

    <section id="contact" class="contact-section">
      <h2>제휴 문의</h2>
      <p>서비스 제휴 및 협업 문의는 아래 양식을 통해 보내주세요.</p>
      <form action="https://formspree.io/f/xgoqbyqe" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="문의하실 내용을 입력해주세요." rows="4" required></textarea>
        </div>
        <button type="submit" class="primary-btn full-width">문의 보내기</button>
      </form>
    </section>

    <section id="comments" class="comments-section">
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = window.location.pathname; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://lotto-generator-kr.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <section class="info">
      <h2>사용 방법</h2>
      <ol>
        <li>번호 생성 버튼을 클릭합니다.</li>
        <li>1~45 사이의 서로 다른 6개 번호가 표시됩니다.</li>
        <li>초기화 버튼을 누르면 다시 새로 추첨할 수 있습니다.</li>
      </ol>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
