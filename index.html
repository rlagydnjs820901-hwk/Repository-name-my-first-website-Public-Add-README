<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 집 유틸리티 포털</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="테마 전환">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>
  
  <nav class="top-nav">
    <a href="classifier.html" class="small-link">AI 구분기</a>
    <a href="lotto.html" class="small-link">로또 추첨기</a>
  </nav>
  
  <main class="app-shell">
    <section class="hero">
      <h1>유틸리티 서비스</h1>
      <p>원하시는 서비스를 선택하여 이용해 보세요.</p>
    </section>

    <nav class="portal-nav">
      <a href="classifier.html" class="portal-card">
        <div class="card-icon">🤖</div>
        <div class="card-content">
          <h3>우리 딸 구분하기 (AI)</h3>
          <p>사진을 업로드하여 큰딸과 작은딸을 AI로 판별합니다.</p>
        </div>
      </a>

      <a href="lotto.html" class="portal-card">
        <div class="card-icon">🎰</div>
        <div class="card-content">
          <h3>로또 번호 추첨기</h3>
          <p>행운의 로또 번호 6개를 무작위로 생성합니다.</p>
        </div>
      </a>
    </nav>

    <section id="contact" class="contact-section">
      <h2>제휴 문의</h2>
      <p>서비스 제휴 및 협업 문의는 아래 양식을 통해 보내주세요.</p>
      <form action="https://formspree.io/f/xgoqbyqe" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="문의하실 내용을 입력해주세요." rows="4" required></textarea>
        </div>
        <button type="submit" class="primary-btn full-width">문의 보내기</button>
      </form>
    </section>

    <section id="comments" class="comments-section">
      <h2>자유 게시판</h2>
      <div id="disqus_thread"></div>
      <script>
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://productbulder-1.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
    </section>
  </main>
</body>
</html>
