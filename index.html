<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 딸 구분하기 & 로또 추첨기</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="테마 전환">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>
  <main class="app-shell">
    <section class="hero">
      <h1>우리 딸 구분하기 (AI)</h1>
      <p>Teachable Machine AI 모델을 사용하여 큰딸과 작은딸을 구분합니다.</p>
    </section>

    <section id="classifier" class="classifier-section">
      <div class="classifier-container">
        <div id="webcam-container" class="video-container">
          <div class="placeholder-text">카메라를 시작하거나 사진을 업로드하세요.</div>
        </div>
        
        <div class="classifier-controls">
          <button type="button" class="primary-btn" onclick="initClassifier()">카메라 시작</button>
          <label for="image-upload" class="secondary-btn">사진 업로드
            <input type="file" id="image-upload" accept="image/*" style="display:none">
          </label>
        </div>

        <div id="label-container" class="label-container">
          <!-- 결과가 여기에 표시됩니다 -->
        </div>
      </div>
    </section>

    <hr class="section-divider">

    <section class="hero secondary">
      <h2>로또 번호 추첨기</h2>
      <p>행운의 번호 6개를 추첨해보세요.</p>
    </section>

    <section class="lotto-card">
      <div class="controls">
        <button id="generateBtn" class="primary-btn">번호 생성</button>
        <button id="resetBtn" class="secondary-btn">초기화</button>
      </div>
      <div id="result" class="result">
        <p class="result-label">추첨된 번호</p>
        <div id="balls" class="balls" aria-live="polite"></div>
      </div>
    </section>

    <section id="contact" class="contact-section">
      <h2>제휴 문의</h2>
      <p>서비스 제휴 및 협업 문의는 아래 양식을 통해 보내주세요.</p>
      <form action="https://formspree.io/f/xgoqbyqe" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함/업체명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="문의하실 내용을 입력해주세요." rows="4" required></textarea>
        </div>
        <button type="submit" class="primary-btn full-width">문의 보내기</button>
      </form>
    </section>

    <section id="comments" class="comments-section">
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
      <script>
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://productbulder-1.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <section class="info">
      <h2>사용 방법</h2>
      <ol>
        <li>AI 구분기: 카메라를 켜거나 사진을 업로드하면 큰딸/작은딸을 판별합니다.</li>
        <li>로또 추첨기: 번호 생성 버튼을 클릭하여 무작위 번호를 뽑습니다.</li>
      </ol>
    </section>
  </main>
</body>
</html>
